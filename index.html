<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral 归因逻辑全解析 - 交互式分析看板</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fafaf9;
            color: #1c1917;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container { height: 350px; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e7e5e4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .step-circle {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 10;
        }

        .connector-line {
            position: absolute;
            top: 1rem;
            left: 2rem;
            right: -2rem;
            height: 2px;
            background-color: #d6d3d1;
            z-index: 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .transition-all-ease {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #lang-toggle {
            user-select: none;
            cursor: pointer;
            min-width: 4rem;
        }
    </style>
</head>
<body class="antialiased selection:bg-teal-200 selection:text-teal-900">

    <!-- Header -->

            <div class="flex items-center space-x-4">

                    <button onclick="scrollToSection('data-source')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.datasource"></button>

    <script>
        // ===================== i18n System =====================
        let currentLang = 'zh';

        const translations = {
            zh: {
                'header.title': 'Referral 归因逻辑解析看板',
                'nav.simulator': '归因模拟器',
                'nav.datasource': '数据溯源',
                'nav.edgecases': '边界场景',

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key] !== undefined) {
                    el.textContent = translations[currentLang][key];
                }
            });
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (translations[currentLang][key] !== undefined) {
                    el.innerHTML = translations[currentLang][key];
                }
            });

            document.title = currentLang === 'zh'
                ? 'Referral 归因逻辑全解析 - 交互式分析看板'
                : 'Referral Attribution Analysis - Interactive Dashboard';

            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中文';
            applyTranslations();
            evaluateSimulator();
            rebuildCharts();
        }

        // ===================== Navigation =====================
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // ===================== Simulator =====================
        const simState = { role: null, download: null, activate: null };

        function simSelect(category, value) {
            simState[category] = value;

            const prefix = category === 'role' ? 'role' : (category === 'download' ? 'dl' : 'act');
            document.querySelectorAll(`.${prefix}-btn`).forEach(btn => {
                btn.classList.remove('bg-teal-50', 'border-teal-400', 'bg-red-50', 'border-red-400', 'ring-2', 'ring-offset-2');
                if (btn.id.includes('other')) {
                    btn.classList.replace('text-red-700', 'text-stone-600');
                } else {
                    btn.classList.replace('text-teal-700', 'text-stone-600');
                }
            });

            const selectedBtn = document.getElementById(`btn-${category}-${value}`);
            if (value === 'other') {
                selectedBtn.classList.add('bg-red-50', 'border-red-400', 'text-red-700', 'ring-2', 'ring-red-200');
            } else {
                selectedBtn.classList.add('bg-teal-50', 'border-teal-400', 'text-teal-700', 'ring-2', 'ring-teal-200');
            }

            evaluateSimulator();
        }

        function evaluateSimulator() {
            const resultBox = document.getElementById('sim-result-box');
            const iconEl = document.getElementById('sim-icon');
            const titleEl = document.getElementById('sim-title');
            const descEl = document.getElementById('sim-desc');

            if (!simState.role || !simState.download || !simState.activate) {
                resultBox.className = "bg-stone-100 rounded-xl p-6 flex flex-col justify-center items-center text-center border border-stone-200 relative z-10 min-h-[250px] transition-all-ease";
                iconEl.innerText = "⏳";
                titleEl.innerText = t('sim.result.waiting.title');
                titleEl.className = "text-xl font-bold text-stone-800 mb-2";
                descEl.innerText = t('sim.result.waiting.desc');
                descEl.className = "text-sm text-stone-500";
                return;
            }

            let isSuccess = false;
            let titleText = "";
            let descText = "";

            if (simState.role === 'other') {
                isSuccess = false;
                titleText = t('sim.result.fail.other.title');
                descText = t('sim.result.fail.other.desc');
            } else {
                if (simState.download === 'yes' || simState.activate === 'yes') {
                    isSuccess = true;
                    const roleName = simState.role === 'new' ? t('sim.result.success.role.new') : t('sim.result.success.role.ra');
                    titleText = t('sim.result.success.prefix') + roleName;
                    
                    if (simState.download === 'yes' && simState.activate === 'yes') {
                        descText = t('sim.result.success.both');
                    } else if (simState.download === 'yes') {
                        descText = t('sim.result.success.dl');
                    } else {
                        descText = t('sim.result.success.act');
                    }
                } else {
                    isSuccess = false;
                    titleText = t('sim.result.fail.action.title');
                    descText = t('sim.result.fail.action.desc');
                }
            }

            if (isSuccess) {
                resultBox.className = "bg-green-50 rounded-xl p-6 flex flex-col justify-center items-center text-center border-2 border-green-400 relative z-10 min-h-[250px] transition-all-ease shadow-lg shadow-green-100";
                iconEl.innerText = "🎉";
                titleEl.innerText = titleText;
                titleEl.className = "text-2xl font-bold text-green-800 mb-2";
                descEl.innerText = descText;
                descEl.className = "text-base text-green-700 font-medium";
            } else {
                resultBox.className = "bg-red-50 rounded-xl p-6 flex flex-col justify-center items-center text-center border-2 border-red-300 relative z-10 min-h-[250px] transition-all-ease";
                iconEl.innerText = "✖️";
                titleEl.innerText = titleText;
                titleEl.className = "text-xl font-bold text-red-800 mb-2";
                descEl.innerText = descText;
                descEl.className = "text-sm text-red-600";
            }
        }

        // ===================== Edge Cases =====================
        function showEdgeCase(caseId) {
            document.querySelectorAll('.edge-case-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            document.querySelectorAll('[id^="tab-case"]').forEach(btn => {
                btn.classList.remove('border-teal-500', 'bg-white', 'font-bold', 'text-stone-800');
                btn.classList.add('border-transparent', 'text-stone-600');
            });

            document.getElementById(`content-${caseId}`).classList.remove('hidden');
            document.getElementById(`content-${caseId}`).classList.add('block');
            
            const activeTab = document.getElementById(`tab-${caseId}`);
            activeTab.classList.remove('border-transparent', 'text-stone-600');
            activeTab.classList.add('border-teal-500', 'bg-white', 'font-bold', 'text-stone-800');
        }

                                    return ' ' + context.label + ': ' + context.parsed + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ===================== Init =====================
        document.addEventListener('DOMContentLoaded', function() {
            applyTranslations();
            evaluateSimulator();
            rebuildCharts();
        });
    </script>
</body>
</html>
