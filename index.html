<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral 归因逻辑全解析 - 交互式分析看板</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fafaf9;
            color: #1c1917;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container { height: 350px; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e7e5e4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .transition-all-ease {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #lang-toggle {
            user-select: none;
            cursor: pointer;
            min-width: 4rem;
        }

        .flow-arrow-h { display: none; }
        .flow-arrow-v { display: flex; }
        @media (min-width: 768px) {
            .flow-arrow-h { display: flex; }
            .flow-arrow-v { display: none; }
        }

        .schema-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-weight: 600;
            border-bottom: 2px solid #d6d3d1;
        }
        .schema-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e7e5e4;
        }
        .schema-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body class="antialiased selection:bg-teal-200 selection:text-teal-900">

    <!-- Header -->
    <header class="bg-white border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">📈</span>
                <h1 class="text-xl font-bold text-stone-800" data-i18n="header.title"></h1>
            </div>
            <div class="flex items-center space-x-4">
                <nav class="hidden md:flex space-x-5">
                    <button onclick="scrollToSection('simulator')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.simulator"></button>
                    <button onclick="scrollToSection('data-source')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.datasource"></button>
                    <button onclick="scrollToSection('edge-cases')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.edgecases"></button>
                    <button onclick="scrollToSection('reward-flow')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.rewardflow"></button>
                    <button onclick="scrollToSection('dashboard')" class="text-sm font-medium text-stone-500 hover:text-teal-600 transition-colors" data-i18n="nav.dashboard"></button>
                </nav>
                <button onclick="toggleLang()" id="lang-toggle" class="px-3 py-1.5 text-sm font-semibold rounded-full border-2 border-stone-300 text-stone-600 hover:border-teal-400 hover:text-teal-700 hover:bg-teal-50 transition-all-ease">
                    EN
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-16 pb-24">

        <!-- Intro -->
        <section class="text-center max-w-3xl mx-auto space-y-4">
            <h2 class="text-3xl font-extrabold text-stone-800 tracking-tight" data-i18n="intro.title"></h2>
            <p class="text-lg text-stone-600" data-i18n-html="intro.desc"></p>
        </section>

        <!-- Section 1: Interactive Simulator -->
        <section id="simulator" class="scroll-mt-24">
            <div class="mb-6">
                <h3 class="text-2xl font-bold text-stone-800 flex items-center"><span class="mr-2">🎛️</span> <span data-i18n="sim.title"></span></h3>
                <p class="text-stone-600 mt-2" data-i18n-html="sim.desc"></p>
            </div>

            <div class="glass-card rounded-2xl p-6 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-teal-50 rounded-full mix-blend-multiply filter blur-3xl opacity-50 transform translate-x-1/2 -translate-y-1/2"></div>

                <!-- Controls -->
                <div class="lg:col-span-2 space-y-6 relative z-10">

                    <!-- Role Selection -->
                    <div class="space-y-3">
                        <label class="block text-sm font-semibold text-stone-700 uppercase tracking-wider" data-i18n="sim.label1"></label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <button onclick="simSelect('role', 'new')" id="btn-role-new" class="sim-btn role-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-teal-400 hover:text-teal-700 transition-all-ease text-left flex flex-col items-start">
                                <span class="text-lg mb-1">👤 New User</span>
                                <span class="text-xs text-stone-400" data-i18n="sim.btn.new.desc"></span>
                            </button>
                            <button onclick="simSelect('role', 'ra')" id="btn-role-ra" class="sim-btn role-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-teal-400 hover:text-teal-700 transition-all-ease text-left flex flex-col items-start">
                                <span class="text-lg mb-1">🔄 RA User</span>
                                <span class="text-xs text-stone-400" data-i18n="sim.btn.ra.desc"></span>
                            </button>
                            <button onclick="simSelect('role', 'other')" id="btn-role-other" class="sim-btn role-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-red-300 hover:text-red-700 transition-all-ease text-left flex flex-col items-start">
                                <span class="text-lg mb-1">🚫 Other Users</span>
                                <span class="text-xs text-stone-400" data-i18n="sim.btn.other.desc"></span>
                            </button>
                        </div>
                    </div>

                    <!-- Download -->
                    <div class="space-y-3">
                        <label class="block text-sm font-semibold text-stone-700 uppercase tracking-wider" data-i18n="sim.label2"></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button onclick="simSelect('download', 'yes')" id="btn-download-yes" class="sim-btn dl-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-teal-400 hover:text-teal-700 transition-all-ease text-center" data-i18n="sim.btn.dl.yes"></button>
                            <button onclick="simSelect('download', 'no')" id="btn-download-no" class="sim-btn dl-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-stone-400 hover:text-stone-700 transition-all-ease text-center" data-i18n="sim.btn.dl.no"></button>
                        </div>
                    </div>

                    <!-- Activation -->
                    <div class="space-y-3">
                        <label class="block text-sm font-semibold text-stone-700 uppercase tracking-wider" data-i18n="sim.label3"></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button onclick="simSelect('activate', 'yes')" id="btn-activate-yes" class="sim-btn act-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-teal-400 hover:text-teal-700 transition-all-ease text-center" data-i18n="sim.btn.act.yes"></button>
                            <button onclick="simSelect('activate', 'no')" id="btn-activate-no" class="sim-btn act-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-stone-400 hover:text-stone-700 transition-all-ease text-center" data-i18n="sim.btn.act.no"></button>
                        </div>
                    </div>

                    <!-- Registration (NEW) -->
                    <div class="space-y-3">
                        <label class="block text-sm font-semibold text-stone-700 uppercase tracking-wider" data-i18n="sim.label4"></label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button onclick="simSelect('register', 'yes')" id="btn-register-yes" class="sim-btn reg-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-teal-400 hover:text-teal-700 transition-all-ease text-center" data-i18n="sim.btn.reg.yes"></button>
                            <button onclick="simSelect('register', 'no')" id="btn-register-no" class="sim-btn reg-btn px-4 py-3 rounded-xl border-2 border-stone-200 text-stone-600 font-medium hover:border-stone-400 hover:text-stone-700 transition-all-ease text-center" data-i18n="sim.btn.reg.no"></button>
                        </div>
                    </div>
                </div>

                <!-- Result Display -->
                <div class="bg-stone-100 rounded-xl p-6 flex flex-col justify-center items-center text-center border border-stone-200 relative z-10 min-h-[280px]" id="sim-result-box">
                    <div class="text-4xl mb-4" id="sim-icon">⏳</div>
                    <h4 class="text-xl font-bold text-stone-800 mb-2" id="sim-title"></h4>
                    <p class="text-sm text-stone-500" id="sim-desc"></p>
                </div>
            </div>
        </section>

        <!-- Section 2: Data Sources Map -->
        <section id="data-source" class="scroll-mt-24">
            <div class="mb-6">
                <h3 class="text-2xl font-bold text-stone-800 flex items-center"><span class="mr-2">📡</span> <span data-i18n="ds.title"></span></h3>
                <p class="text-stone-600 mt-2" data-i18n="ds.desc"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Card 1: Download Attribution -->
                <div class="glass-card p-6 rounded-2xl group hover:-translate-y-1 transition-all-ease">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-2xl mb-4">📥</div>
                    <h4 class="text-lg font-bold text-stone-800 mb-2" data-i18n="ds.card1.title"></h4>
                    <ul class="space-y-3 mt-4">
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card1.item1"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card1.item2"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card1.item3"></span>
                        </li>
                    </ul>
                </div>

                <!-- Card 2: Activation Attribution -->
                <div class="glass-card p-6 rounded-2xl group hover:-translate-y-1 transition-all-ease">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center text-2xl mb-4">🚀</div>
                    <h4 class="text-lg font-bold text-stone-800 mb-2" data-i18n="ds.card2.title"></h4>
                    <ul class="space-y-3 mt-4">
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card2.item1"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card2.item2"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card2.item3"></span>
                        </li>
                    </ul>
                </div>

                <!-- Card 3: Registration Attribution (NEW) -->
                <div class="glass-card p-6 rounded-2xl group hover:-translate-y-1 transition-all-ease">
                    <div class="w-12 h-12 bg-teal-100 text-teal-600 rounded-lg flex items-center justify-center text-2xl mb-4">📝</div>
                    <h4 class="text-lg font-bold text-stone-800 mb-2" data-i18n="ds.card3.title"></h4>
                    <ul class="space-y-3 mt-4">
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card3.item1"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card3.item2"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card3.item3"></span>
                        </li>
                    </ul>
                </div>

                <!-- Card 4: User Identity (UPP) -->
                <div class="glass-card p-6 rounded-2xl group hover:-translate-y-1 transition-all-ease">
                    <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center text-2xl mb-4">👤</div>
                    <h4 class="text-lg font-bold text-stone-800 mb-2" data-i18n="ds.card4.title"></h4>
                    <ul class="space-y-3 mt-4">
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card4.item1"></span>
                        </li>
                        <li class="flex items-start">
                            <span class="text-green-500 mr-2 mt-0.5 shrink-0">➔</span>
                            <span class="text-sm text-stone-600" data-i18n-html="ds.card4.item2"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Section 3: Edge Cases -->
        <section id="edge-cases" class="scroll-mt-24">
            <div class="mb-6">
                <h3 class="text-2xl font-bold text-stone-800 flex items-center"><span class="mr-2">🔍</span> <span data-i18n="ec.title"></span></h3>
                <p class="text-stone-600 mt-2" data-i18n="ec.desc"></p>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden flex flex-col md:flex-row">
                <!-- Sidebar Tabs -->
                <div class="bg-stone-50 w-full md:w-1/3 border-b md:border-b-0 md:border-r border-stone-200">
                    <button onclick="showEdgeCase('case1')" id="tab-case1" class="w-full text-left px-6 py-4 border-l-4 border-teal-500 bg-white font-bold text-stone-800 focus:outline-none transition-colors" data-i18n="ec.tab1"></button>
                    <button onclick="showEdgeCase('case2')" id="tab-case2" class="w-full text-left px-6 py-4 border-l-4 border-transparent text-stone-600 hover:bg-stone-100 focus:outline-none transition-colors" data-i18n="ec.tab2"></button>
                    <button onclick="showEdgeCase('case3')" id="tab-case3" class="w-full text-left px-6 py-4 border-l-4 border-transparent text-stone-600 hover:bg-stone-100 focus:outline-none transition-colors" data-i18n="ec.tab3"></button>
                </div>

                <!-- Content Area -->
                <div class="w-full md:w-2/3 p-6 md:p-8 bg-white min-h-[300px] relative">

                    <!-- Case 1: Cross-day -->
                    <div id="content-case1" class="edge-case-content block animation-fade">
                        <h4 class="text-xl font-bold text-stone-800 mb-2" data-i18n="ec.case1.title"></h4>
                        <p class="text-sm text-stone-600 mb-6 bg-amber-50 border border-amber-200 p-3 rounded-lg" data-i18n-html="ec.case1.rule"></p>

                        <div class="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-stone-300 before:to-transparent">
                            <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-stone-200 text-stone-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">📅</div>
                                <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-stone-200 bg-stone-50 shadow-sm">
                                    <div class="font-bold text-stone-700" data-i18n="ec.case1.step1.title"></div>
                                    <div class="text-sm text-stone-600 mt-1" data-i18n="ec.case1.step1.desc"></div>
                                </div>
                            </div>
                            <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-blue-100 text-blue-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">☀️</div>
                                <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-stone-200 bg-white shadow-sm">
                                    <div class="font-bold text-stone-700" data-i18n="ec.case1.step2.title"></div>
                                    <div class="text-sm text-stone-600 mt-1" data-i18n="ec.case1.step2.desc"></div>
                                </div>
                            </div>
                            <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-red-100 text-red-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">🚫</div>
                                <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-red-200 bg-red-50 shadow-sm">
                                    <div class="font-bold text-red-700" data-i18n="ec.case1.result.title"></div>
                                    <div class="text-sm text-red-600 mt-1" data-i18n="ec.case1.result.desc"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Case 2: Last Click Wins -->
                    <div id="content-case2" class="edge-case-content hidden animation-fade">
                        <h4 class="text-xl font-bold text-stone-800 mb-2" data-i18n="ec.case2.title"></h4>
                        <p class="text-sm text-stone-600 mb-6 bg-blue-50 border border-blue-200 p-3 rounded-lg" data-i18n-html="ec.case2.rule"></p>

                        <div class="space-y-4">
                            <div class="flex items-center p-3 bg-stone-50 rounded-lg border border-stone-200">
                                <div class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center mr-3 shrink-0">1</div>
                                <div data-i18n-html="ec.case2.step1"></div>
                            </div>
                            <div class="flex items-center p-3 bg-stone-50 rounded-lg border border-stone-200">
                                <div class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center mr-3 shrink-0">2</div>
                                <div data-i18n-html="ec.case2.step2"></div>
                            </div>
                            <div class="flex items-center p-3 bg-stone-50 rounded-lg border border-stone-200">
                                <div class="w-8 h-8 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center mr-3 shrink-0">3</div>
                                <div data-i18n-html="ec.case2.step3"></div>
                            </div>
                            <div class="flex items-center p-3 bg-stone-50 rounded-lg border border-stone-200">
                                <div class="w-8 h-8 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center mr-3 shrink-0">4</div>
                                <div data-i18n-html="ec.case2.step4"></div>
                            </div>
                            <div class="mt-4 p-4 bg-green-50 rounded-xl border border-green-200 flex items-start">
                                <div class="text-2xl mr-3">🏆</div>
                                <div>
                                    <div class="font-bold text-green-800" data-i18n="ec.case2.result.title"></div>
                                    <div class="text-sm text-green-700 mt-1" data-i18n-html="ec.case2.result.desc"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Case 3: Indirect Path (UPDATED for 3-path) -->
                    <div id="content-case3" class="edge-case-content hidden animation-fade">
                        <h4 class="text-xl font-bold text-stone-800 mb-2" data-i18n="ec.case3.title"></h4>
                        <p class="text-sm text-stone-600 mb-6 bg-teal-50 border border-teal-200 p-3 rounded-lg" data-i18n-html="ec.case3.rule"></p>

                        <div class="grid grid-cols-1 gap-4">
                            <div class="border border-stone-200 rounded-xl p-4">
                                <h5 class="text-xs font-bold text-stone-400 uppercase tracking-wider mb-3" data-i18n="ec.case3.track1.title"></h5>
                                <div class="flex flex-col space-y-2">
                                    <div class="flex items-center text-sm"><span class="w-6 text-center mr-2 shrink-0">🔗</span> <span data-i18n="ec.case3.track1.s1"></span></div>
                                    <div class="flex items-center text-sm"><span class="w-6 text-center mr-2 shrink-0">📱</span> <span data-i18n="ec.case3.track1.s2"></span></div>
                                    <div class="flex items-center text-sm"><span class="w-6 text-center mr-2 shrink-0">🔗</span> <span data-i18n="ec.case3.track1.s3"></span></div>
                                </div>
                            </div>

                            <div class="flex justify-center -my-3 z-10 relative">
                                <div class="bg-white px-2 text-stone-400" data-i18n="ec.case3.divider"></div>
                            </div>

                            <div class="border border-teal-200 bg-teal-50 rounded-xl p-4">
                                <h5 class="text-xs font-bold text-teal-600 uppercase tracking-wider mb-3" data-i18n="ec.case3.track2.title"></h5>
                                <div class="flex flex-col space-y-2">
                                    <div class="flex items-center text-sm"><span class="w-6 text-center mr-2 shrink-0">✅</span> <span data-i18n="ec.case3.track2.s1"></span></div>

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key] !== undefined) {
                    el.textContent = translations[currentLang][key];
                }
            });
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (translations[currentLang][key] !== undefined) {
                    el.innerHTML = translations[currentLang][key];
                }
            });

            document.title = currentLang === 'zh'
                ? 'Referral 归因逻辑全解析 - 交互式分析看板'
                : 'Referral Attribution Analysis - Interactive Dashboard';

            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中文';
            applyTranslations();
            evaluateSimulator();
            rebuildCharts();
        }

        // ===================== Navigation =====================
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        // ===================== Simulator =====================
        const simState = { role: null, download: null, activate: null, register: null };

        function simSelect(category, value) {
            simState[category] = value;

            const prefixMap = { role: 'role', download: 'dl', activate: 'act', register: 'reg' };
            const prefix = prefixMap[category];
            document.querySelectorAll(`.${prefix}-btn`).forEach(btn => {
                btn.classList.remove('bg-teal-50', 'border-teal-400', 'bg-red-50', 'border-red-400', 'ring-2', 'ring-offset-2');
                if (btn.id.includes('other')) {
                    btn.classList.replace('text-red-700', 'text-stone-600');
                } else {
                    btn.classList.replace('text-teal-700', 'text-stone-600');
                }
            });

            const selectedBtn = document.getElementById(`btn-${category}-${value}`);
            if (value === 'other') {
                selectedBtn.classList.add('bg-red-50', 'border-red-400', 'text-red-700', 'ring-2', 'ring-red-200');
            } else {
                selectedBtn.classList.add('bg-teal-50', 'border-teal-400', 'text-teal-700', 'ring-2', 'ring-teal-200');
            }

            evaluateSimulator();
        }

        function evaluateSimulator() {
            const resultBox = document.getElementById('sim-result-box');
            const iconEl = document.getElementById('sim-icon');
            const titleEl = document.getElementById('sim-title');
            const descEl = document.getElementById('sim-desc');

            if (!simState.role || !simState.download || !simState.activate || !simState.register) {
                resultBox.className = "bg-stone-100 rounded-xl p-6 flex flex-col justify-center items-center text-center border border-stone-200 relative z-10 min-h-[280px] transition-all-ease";
                iconEl.innerText = "⏳";
                titleEl.innerText = t('sim.result.waiting.title');
                titleEl.className = "text-xl font-bold text-stone-800 mb-2";
                descEl.innerText = t('sim.result.waiting.desc');
                descEl.className = "text-sm text-stone-500";
                return;
            }

            let isSuccess = false;
            let titleText = "";
            let descText = "";

            if (simState.role === 'other') {
                isSuccess = false;
                titleText = t('sim.result.fail.other.title');
                descText = t('sim.result.fail.other.desc');
            } else {
                const dlOk = simState.download === 'yes';
                const actOk = simState.activate === 'yes';
                const regOk = simState.register === 'yes';
                const pathCount = (dlOk ? 1 : 0) + (actOk ? 1 : 0) + (regOk ? 1 : 0);

                if (pathCount > 0) {
                    isSuccess = true;
                    const roleName = simState.role === 'new' ? t('sim.result.success.role.new') : t('sim.result.success.role.ra');
                    titleText = t('sim.result.success.prefix') + roleName;

                    if (pathCount === 3) {
                        descText = t('sim.result.success.all');
                    } else if (pathCount === 1) {
                        if (dlOk) descText = t('sim.result.success.dl');
                        else if (actOk) descText = t('sim.result.success.act');
                        else descText = t('sim.result.success.reg');
                    } else {
                        descText = t('sim.result.success.multi');
                    }
                } else {
                    isSuccess = false;
                    titleText = t('sim.result.fail.action.title');
                    descText = t('sim.result.fail.action.desc');
                }
            }

            if (isSuccess) {
                resultBox.className = "bg-green-50 rounded-xl p-6 flex flex-col justify-center items-center text-center border-2 border-green-400 relative z-10 min-h-[280px] transition-all-ease shadow-lg shadow-green-100";
                iconEl.innerText = "🎉";
                titleEl.innerText = titleText;
                titleEl.className = "text-2xl font-bold text-green-800 mb-2";
                descEl.innerText = descText;
                descEl.className = "text-base text-green-700 font-medium";
            } else {
                resultBox.className = "bg-red-50 rounded-xl p-6 flex flex-col justify-center items-center text-center border-2 border-red-300 relative z-10 min-h-[280px] transition-all-ease";
                iconEl.innerText = "✖️";
                titleEl.innerText = titleText;
                titleEl.className = "text-xl font-bold text-red-800 mb-2";
                descEl.innerText = descText;
                descEl.className = "text-sm text-red-600";
            }
        }

        // ===================== Edge Cases =====================
        function showEdgeCase(caseId) {
            document.querySelectorAll('.edge-case-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            document.querySelectorAll('[id^="tab-case"]').forEach(btn => {
                btn.classList.remove('border-teal-500', 'bg-white', 'font-bold', 'text-stone-800');
                btn.classList.add('border-transparent', 'text-stone-600');
            });

            document.getElementById(`content-${caseId}`).classList.remove('hidden');
            document.getElementById(`content-${caseId}`).classList.add('block');

            const activeTab = document.getElementById(`tab-${caseId}`);
            activeTab.classList.remove('border-transparent', 'text-stone-600');
            activeTab.classList.add('border-teal-500', 'bg-white', 'font-bold', 'text-stone-800');
        }

        // ===================== Charts =====================
        let identityChartInstance = null;
        let actionChartInstance = null;

        function rebuildCharts() {
            if (identityChartInstance) identityChartInstance.destroy();
            if (actionChartInstance) actionChartInstance.destroy();

            const ctxIdentity = document.getElementById('identityChart').getContext('2d');
            identityChartInstance = new Chart(ctxIdentity, {
                type: 'doughnut',
                data: {
                    labels: t('chart.identity.labels'),
                    datasets: [{
                        data: [75, 25],
                        backgroundColor: ['#14b8a6', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' ' + context.label + ': ' + context.parsed + '%';
                                }
                            }
                        }
                    }
                }
            });

            const ctxAction = document.getElementById('actionChart').getContext('2d');
            actionChartInstance = new Chart(ctxAction, {
                type: 'pie',
                data: {
                    labels: t('chart.action.labels'),
                    datasets: [{
                        data: [35, 25, 20, 20],
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#14b8a6', '#10b981'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' ' + context.label + ': ' + context.parsed + '%';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ===================== Init =====================
        document.addEventListener('DOMContentLoaded', function() {
            applyTranslations();
            evaluateSimulator();
            rebuildCharts();
        });
    </script>
